services:
  app:
    build: .
    container_name: market-analyzer
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    command: >
      sh -c " python -m scripts.cli init-db && python -m scripts.cli runtime & python -m scripts.cli serve --host 0.0.0.0 --port 8000 --reload "
